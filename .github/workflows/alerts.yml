name: alerts-to-notion

on:
  schedule:
    # 매일 00:00 UTC = 한국 09:00
    - cron: "0 0 * * *"
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 지난 실행에서 생산된 .seen_urls.json 복원(중복 방지)
      - name: Restore seen cache
        uses: actions/download-artifact@v4
        with:
          name: seen-cache
          path: .
        continue-on-error: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: python -m pip install -r requirements.txt

      - name: Run script
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          FEED_URLS: ${{ secrets.FEED_URLS }}
          LOOKBACK_HOURS: ${{ secrets.LOOKBACK_HOURS }}
          MAX_ITEMS: ${{ secrets.MAX_ITEMS }}
          SIMILARITY_THRESHOLD: ${{ secrets.SIMILARITY_THRESHOLD }}
          MAX_PER_DOMAIN: ${{ secrets.MAX_PER_DOMAIN }}
          ONLY_NEW: ${{ secrets.ONLY_NEW }}
          SEEN_TTL_DAYS: ${{ secrets.SEEN_TTL_DAYS }}
          # 아래 두 줄은 안전한 기본값
          DRY_RUN: "0"
          DEBUG_DUMP: "0"
        run: python alerts_to_notion.py

      # 이번 실행 후 갱신된 .seen_urls.json 저장(다음 실행에서 재사용)
      - name: Save seen cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seen-cache
          path: .seen_urls.json
          if-no-files-found: ignore
          retention-days: 90
